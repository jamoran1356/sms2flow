services:
  db:
    image: postgres:16-alpine
    container_name: sms2flow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sms2flow
      POSTGRES_PASSWORD: sms2flow_secret
      POSTGRES_DB: sms2flow
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sms2flow -d sms2flow"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sms2flow-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=proxy"
      - "traefik.http.routers.sms2flow.rule=Host(`sms2flow.com`,`www.sms2flow.com`)"
      - "traefik.http.routers.sms2flow-web.rule=Host(`sms2flow.com`,`www.sms2flow.com`)"
      - "traefik.http.routers.sms2flow-web.entrypoints=web"
      - "traefik.http.routers.sms2flow-web.middlewares=sms2flow-https"
      - "traefik.http.middlewares.sms2flow-https.redirectscheme.scheme=https"
      - "traefik.http.routers.sms2flow.entrypoints=websecure"
      - "traefik.http.routers.sms2flow.tls=true"
      - "traefik.http.routers.sms2flow.tls.certresolver=le"
      - "traefik.http.services.sms2flow.loadbalancer.server.port=3000"
    environment:
      DATABASE_URL: "${DATABASE_URL}"
      NEXTAUTH_URL: "https://sms2flow.com"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      FLOW_ACCESS_NODE: "${FLOW_ACCESS_NODE:-https://rest-testnet.onflow.org}"
      FLOW_NETWORK: "${FLOW_NETWORK:-testnet}"
      FLOW_ADMIN_ADDRESS: "${FLOW_ADMIN_ADDRESS}"
      FLOW_ADMIN_PRIVATE_KEY: "${FLOW_ADMIN_PRIVATE_KEY}"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - default
      - proxy

volumes:
  postgres_data:

networks:
  proxy:
    external: true
