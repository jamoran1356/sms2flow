services:
  db:
    image: postgres:16-alpine
    container_name: sms2flow-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: sms2flow
      POSTGRES_PASSWORD: sms2flow_secret
      POSTGRES_DB: sms2flow
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sms2flow -d sms2flow"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sms2flow-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://sms2flow:sms2flow_secret@db:5432/sms2flow?schema=public"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET}"
      FLOW_ACCESS_NODE: "${FLOW_ACCESS_NODE:-https://rest-testnet.onflow.org}"
      FLOW_NETWORK: "${FLOW_NETWORK:-testnet}"
      FLOW_ADMIN_ADDRESS: "${FLOW_ADMIN_ADDRESS}"
      FLOW_ADMIN_PRIVATE_KEY: "${FLOW_ADMIN_PRIVATE_KEY}"
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
